
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hehehehe</title>
    <style>
        :root {
            --pink: #ff7eb3;
            --pink-deep: #ff4d94;
            --lavender: #c4a7e7;
            --peach: #ffb7a7;
            --sky: #a7d8f0;
            --white-soft: rgba(255, 255, 255, 0.9);
            --glass: rgba(255, 255, 255, 0.18);
            --glass-strong: rgba(255, 255, 255, 0.28);
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
            --shadow-strong: 0 20px 60px rgba(0, 0, 0, 0.15);
            --text-dark: #4a3048;
            --text-light: #6b4e6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(-45deg,
                    #ffd6ec, #f0d5ff, #d5eaff, #ffe0d5,
                    #ffd6ec, #e8d5ff, #cdeaff, #ffd6ec);
            background-size: 600% 600%;
            animation: bgMove 20s ease infinite;
            color: var(--text-dark);
            cursor: default;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        @keyframes bgMove {
            0% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 100% 0%;
            }
            50% {
                background-position: 100% 100%;
            }
            75% {
                background-position: 0% 100%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* PARTICLE CANVAS */
        #particleCanvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        /* WELCOME SCREEN */
        #welcome {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: rgba(20, 10, 25, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 9999;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1),
                visibility 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #welcome.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #welcome .welcome-inner {
            text-align: center;
            animation: welcomeFloat 3s ease-in-out infinite;
        }

        @keyframes welcomeFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-18px);
            }
        }

        #welcome .welcome-icon {
            font-size: 80px;
            animation: welcomeBounce 1.5s ease-in-out infinite;
            display: block;
            filter: drop-shadow(0 10px 30px rgba(255, 120, 160, 0.6));
        }

        @keyframes welcomeBounce {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            30% {
                transform: translateY(-30px) scale(1.15);
            }
            50% {
                transform: translateY(0) scale(0.95);
            }
            70% {
                transform: translateY(-12px) scale(1.05);
            }
        }

        #welcome h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            margin: 10px 0 8px;
            color: white;
            text-shadow:
                0 0 30px rgba(255, 150, 180, 0.9),
                0 0 60px rgba(255, 120, 160, 0.6),
                0 0 100px rgba(255, 100, 150, 0.4),
                0 4px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
            font-weight: 700;
        }

        #welcome .welcome-sub {
            color: rgba(255, 255, 255, 0.85);
            font-size: 1rem;
            font-style: italic;
            margin-bottom: 28px;
            letter-spacing: 1px;
        }

        #startBtn {
            padding: 16px 40px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 60px;
            font-size: 1.15rem;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            box-shadow: 0 8px 32px rgba(255, 100, 150, 0.35);
            position: relative;
            overflow: hidden;
        }

        #startBtn::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 60px;
            background: linear-gradient(45deg, #ff7eb3, #c4a7e7, #a7d8f0, #ff7eb3);
            background-size: 300% 300%;
            animation: btnShine 3s ease infinite;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s;
        }

        @keyframes btnShine {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        #startBtn:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow: 0 16px 48px rgba(255, 100, 150, 0.5);
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.3);
        }
        #startBtn:hover::before {
            opacity: 1;
        }
        #startBtn:active {
            transform: scale(0.96);
            transition: all 0.1s;
        }

        /* MUSIC BUTTON */
        .music-btn {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            z-index: 998;
            background: var(--glass);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            color: white;
            box-shadow: var(--shadow);
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .music-btn:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-strong);
            border-color: rgba(255, 255, 255, 0.8);
        }
        .music-btn.playing {
            animation: musicPulse 1.5s ease-in-out infinite;
            border-color: #ff7eb3;
            box-shadow: 0 0 30px rgba(255, 120, 160, 0.5);
        }
        @keyframes musicPulse {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(255, 120, 160, 0.4);
            }
            50% {
                box-shadow: 0 0 45px rgba(255, 120, 160, 0.75), 0 0 80px rgba(255, 150, 180, 0.4);
            }
        }
        .music-btn .visualizer {
            display: none;
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: rgba(255, 255, 255, 0.7);
            animation: vizSpin 2s linear infinite;
        }
        .music-btn.playing .visualizer {
            display: block;
        }
        @keyframes vizSpin {
            to {
                transform: rotate(360deg);
            }
        }

        /* MAIN CONTAINER */
        .container {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px 20px 50px;
            z-index: 5;
            gap: 10px;
        }

        /* TITLE */
        .title-wrapper {
            text-align: center;
            position: relative;
        }

        .title {
            font-size: clamp(2.2rem, 6vw, 4.5rem);
            text-align: center;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg,
                    #ff4d94, #c44dff, #ff7eb3, #ff4d94);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleShimmer 4s ease infinite;
            filter: drop-shadow(0 4px 12px rgba(255, 80, 140, 0.3));
            line-height: 1.2;
        }

        @keyframes titleShimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .subtitle {
            margin-top: 6px;
            font-size: 1rem;
            font-style: italic;
            color: var(--text-light);
            letter-spacing: 1.5px;
            opacity: 0.85;
            animation: subtitleGlow 3s ease-in-out infinite;
        }
        @keyframes subtitleGlow {
            0%,
            100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }

        /* SLIDER */
        .slider-wrapper {
            position: relative;
            width: min(800px, 90vw);
            margin-top: 20px;
        }

        .slider {
            position: relative;
            width: 100%;
            height: clamp(220px, 35vw, 340px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-strong);
            border: 3px solid rgba(255, 255, 255, 0.4);
            transition: box-shadow 0.5s;
            background: rgba(0,0,0,0.1); /* fallback jika gambar belum dimuat */
        }
        .slider:hover {
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.2), 0 0 0 4px rgba(255, 255, 255, 0.3);
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1),
                transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            object-fit: cover;
            border-radius: 22px;
            transform: scale(1.03);
        }

        .slide.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Navigation dots */
        .slider-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 18px;
        }
        .slider-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .slider-dot.active {
            background: #ff4d94;
            border-color: #ff4d94;
            box-shadow: 0 0 18px rgba(255, 77, 148, 0.7);
            transform: scale(1.3);
            width: 28px;
            border-radius: 20px;
        }
        .slider-dot:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: scale(1.15);
        }
        .slider-dot.active:hover {
            transform: scale(1.35);
        }

        /* LOVE LETTER */
        .love-letter {
            margin-top: 20px;
            width: min(850px, 90vw);
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 28px 30px;
            border-radius: 22px;
            line-height: 2;
            font-size: 1rem;
            min-height: 140px;
            box-shadow: var(--shadow-strong);
            border: 2px solid rgba(255, 255, 255, 0.35);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.4px;
            color: var(--text-dark);
            transition: all 0.5s;
        }
        .love-letter:hover {
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.12), 0 0 0 4px rgba(255, 200, 220, 0.25);
        }
        .love-letter::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 22px;
            background: linear-gradient(135deg,
                    rgba(255, 150, 180, 0.5),
                    rgba(180, 150, 220, 0.5),
                    rgba(150, 200, 230, 0.5),
                    rgba(255, 180, 160, 0.5));
            background-size: 300% 300%;
            z-index: -1;
            animation: letterBorder 8s ease infinite;
            opacity: 0.6;
        }
        @keyframes letterBorder {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        #typing {
            white-space: pre-wrap;
            position: relative;
            z-index: 1;
        }
        #typing::after {
            content: '|';
            animation: cursorBlink 0.8s step-end infinite;
            color: #ff4d94;
            font-weight: bold;
            font-size: 1.1em;
        }
        #typing.done::after {
            animation: cursorBlink 2s step-end infinite;
        }
        @keyframes cursorBlink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* SAKURA & HEARTS */
        .sakura {
            position: fixed;
            top: -40px;
            font-size: 22px;
            pointer-events: none;
            z-index: 10;
            animation: fall linear forwards;
            filter: drop-shadow(0 2px 6px rgba(255, 150, 180, 0.5));
        }
        @keyframes fall {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            20% {
                transform: translateY(20vh) translateX(30px) rotate(140deg);
                opacity: 0.9;
            }
            40% {
                transform: translateY(40vh) translateX(-20px) rotate(280deg);
                opacity: 0.8;
            }
            60% {
                transform: translateY(60vh) translateX(50px) rotate(420deg);
                opacity: 0.6;
            }
            80% {
                transform: translateY(80vh) translateX(-30px) rotate(560deg);
                opacity: 0.3;
            }
            100% {
                transform: translateY(110vh) translateX(60px) rotate(720deg);
                opacity: 0;
            }
        }

        .heart-fly {
            position: fixed;
            font-size: 22px;
            pointer-events: none;
            z-index: 15;
            animation: heartFlyUp 2.2s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            filter: drop-shadow(0 2px 8px rgba(255, 100, 140, 0.6));
        }
        @keyframes heartFlyUp {
            0% {
                transform: translateY(0) scale(0.4) rotate(0deg);
                opacity: 1;
            }
            30% {
                transform: translateY(-40px) scale(1.3) rotate(15deg);
                opacity: 1;
            }
            70% {
                transform: translateY(-100px) scale(0.8) rotate(-10deg);
                opacity: 0.7;
            }
            100% {
                transform: translateY(-160px) scale(0.2) rotate(25deg);
                opacity: 0;
            }
        }

        /* FLOATING BACKGROUND HEARTS */
        .floating-bg-heart {
            position: fixed;
            pointer-events: none;
            z-index: 2;
            animation: floatBgHeart linear forwards;
            opacity: 0.35;
        }
        @keyframes floatBgHeart {
            0% {
                transform: translateY(0) scale(0.6);
                opacity: 0;
            }
            10% {
                opacity: 0.35;
            }
            90% {
                opacity: 0.15;
            }
            100% {
                transform: translateY(-110vh) scale(1.4);
                opacity: 0;
            }
        }

        /* SPARKLE ON CLICK */
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 20;
            animation: sparklePop 0.7s ease-out forwards;
            font-size: 16px;
        }
        @keyframes sparklePop {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: scale(1.8) rotate(180deg) translateY(-30px);
                opacity: 0;
            }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .slider {
                height: 200px;
                border-radius: 18px;
            }
            .slide {
                border-radius: 16px;
            }
            .love-letter {
                font-size: 0.88rem;
                padding: 20px 18px;
                border-radius: 16px;
                line-height: 1.8;
            }
            .love-letter::before {
                border-radius: 16px;
            }
            #welcome h1 {
                font-size: 1.6rem;
            }
            #welcome .welcome-icon {
                font-size: 55px;
            }
            #startBtn {
                padding: 14px 30px;
                font-size: 1rem;
            }
            .title {
                font-size: 2rem;
                letter-spacing: 1.5px;
            }
            .slider-dot {
                width: 10px;
                height: 10px;
            }
            .slider-dot.active {
                width: 22px;
            }
            .music-btn {
                width: 44px;
                height: 44px;
                font-size: 18px;
                top: 16px;
                right: 16px;
            }
        }
        @media (max-width: 400px) {
            .slider {
                height: 160px;
            }
            .love-letter {
                font-size: 0.8rem;
                padding: 16px 14px;
            }
            .title {
                font-size: 1.6rem;
            }
            #welcome h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <!-- PARTICLE CANVAS -->
    <canvas id="particleCanvas"></canvas>

    <!-- WELCOME SCREEN -->
    <div id="welcome">
        <div class="welcome-inner">
            <span class="welcome-icon">💖</span>
            <h1>Hai ebeb</h1>
            <p class="welcome-sub">Selamat pagi ✨</p>
            <button id="startBtn">Pencet ini beb</button>
        </div>
    </div>

    <!-- BACKGROUND MUSIC -->
    <audio id="bgMusic" loop preload="auto">
        <source src="musik-romantis.mp3" type="audio/mpeg">
    </audio>

    <!-- MUSIC TOGGLE BUTTON -->
    <button class="music-btn" id="musicBtn" aria-label="Toggle Musik">
        🎵
        <span class="visualizer"></span>
    </button>

    <!-- MAIN CONTENT -->
    <div class="container">
        <!-- TITLE -->
        <div class="title-wrapper">
            <h1 class="title">Hai ebeb</h1>
            <p class="subtitle">scroll bawah beb</p>
        </div>

        <!-- SLIDER (GUNAKAN GAMBAR DARI FOLDER) -->
        <div class="slider-wrapper">
            <div class="slider" id="slider">
                <img src="gambar1.jpg" class="slide active" alt="Foto 1">
                <img src="gambar2.jpg" class="slide" alt="Foto 2">
                <img src="gambar3.jpg" class="slide" alt="Foto 3">
                <img src="gambar4.jpg" class="slide" alt="Foto 4">
            </div>
            <div class="slider-dots" id="sliderDots">
                <span class="slider-dot active" data-index="0"></span>
                <span class="slider-dot" data-index="1"></span>
                <span class="slider-dot" data-index="2"></span>
                <span class="slider-dot" data-index="3"></span>
            </div>
        </div>

        <!-- LOVE LETTER -->
        <div class="love-letter">
            <p id="typing"></p>
        </div>
    </div>

    <script>
        (function() {
            // DOM Elements
            const bgMusic = document.getElementById('bgMusic');
            const startBtn = document.getElementById('startBtn');
            const welcome = document.getElementById('welcome');
            const musicBtn = document.getElementById('musicBtn');
            const slides = document.querySelectorAll('.slide');
            const dots = document.querySelectorAll('.slider-dot');
            const typingEl = document.getElementById('typing');
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');

            let playing = false;
            let currentSlide = 0;
            let slideInterval;
            let userInteracted = false;

            // Canvas size
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // Particles
            const particles = [];
            const maxParticles = 50;

            class Particle {
                constructor() {
                    this.reset();
                    this.y = Math.random() * canvas.height;
                }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height + Math.random() * 40;
                    this.size = Math.random() * 2.5 + 1;
                    this.speedY = -(Math.random() * 0.6 + 0.2);
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.opacity = Math.random() * 0.5 + 0.15;
                    this.life = Math.random() * 300 + 200;
                    this.age = 0;
                    this.hue = Math.random() < 0.5 ? '255,180,200' : '220,180,240';
                }
                update() {
                    this.age++;
                    this.y += this.speedY;
                    this.x += this.speedX + Math.sin(this.age * 0.02) * 0.3;
                    if (this.age > this.life || this.y < -20 || this.x < -20 || this.x > canvas.width + 20) {
                        this.reset();
                        this.y = canvas.height + Math.random() * 40;
                        this.age = 0;
                    }
                }
                draw(ctx) {
                    const fadeRatio = this.age < 30 ? this.age / 30 : (this.life - this.age < 40 ? (this.life - this.age) / 40 : 1);
                    const alpha = this.opacity * fadeRatio;
                    ctx.fillStyle = `rgba(${this.hue},${alpha})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    if (this.size > 1.8) {
                        ctx.fillStyle = `rgba(${this.hue},${alpha * 0.3})`;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            for (let i = 0; i < maxParticles; i++) {
                particles.push(new Particle());
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw(ctx);
                });
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            // Music control
            function updateMusicButton() {
                if (playing) {
                    musicBtn.innerHTML = '⏸️<span class="visualizer"></span>';
                    musicBtn.classList.add('playing');
                } else {
                    musicBtn.innerHTML = '🎵<span class="visualizer"></span>';
                    musicBtn.classList.remove('playing');
                }
            }

            startBtn.onclick = async () => {
                try {
                    await bgMusic.play();
                    playing = true;
                } catch (e) {
                    console.log('Musik tidak dapat diputar:', e.message);
                }
                updateMusicButton();
                welcome.classList.add('hidden');
                setTimeout(() => {
                    if (welcome.parentNode) welcome.remove();
                }, 1200);
                setTimeout(startTyping, 1500);
                startSlider();
            };

            musicBtn.onclick = () => {
                if (playing) {
                    bgMusic.pause();
                    playing = false;
                } else {
                    bgMusic.play().then(() => {
                        playing = true;
                    }).catch(() => {
                        playing = !playing;
                    });
                }
                updateMusicButton();
            };

            // Slider logic
            function goToSlide(index) {
                if (index === currentSlide) return;
                slides[currentSlide].classList.remove('active');
                dots[currentSlide].classList.remove('active');
                currentSlide = index;
                slides[currentSlide].classList.add('active');
                dots[currentSlide].classList.add('active');
            }

            function nextSlide() {
                const next = (currentSlide + 1) % slides.length;
                goToSlide(next);
            }

            function startSlider() {
                if (slideInterval) clearInterval(slideInterval);
                slideInterval = setInterval(() => {
                    if (!userInteracted) {
                        nextSlide();
                    }
                    userInteracted = false;
                }, 4000);
            }

            dots.forEach(dot => {
                dot.addEventListener('click', () => {
                    const index = parseInt(dot.getAttribute('data-index'));
                    if (index !== currentSlide) {
                        userInteracted = true;
                        goToSlide(index);
                        if (slideInterval) clearInterval(slideInterval);
                        slideInterval = setInterval(() => {
                            if (!userInteracted) nextSlide();
                            userInteracted = false;
                        }, 4000);
                    }
                });
            });

                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            sliderEl.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].screenX;
                const diff = touchStartX - touchEndX;
                if (Math.abs(diff) > 50) {
                    userInteracted = true;
                    if (diff > 0) {
                        nextSlide();
                    } else {
                        const prev = (currentSlide - 1 + slides.length) % slides.length;
                        goToSlide(prev);
                    }
                    if (slideInterval) clearInterval(slideInterval);
                    slideInterval = setInterval(() => {
                        if (!userInteracted) nextSlide();
                        userInteracted = false;
                    }, 4000);

                typingIndex = 0;
                typingEl.textContent = '';
                typingEl.classList.remove('done');
                typeNextChar();

            function typeNextChar() {
                if (typingIndex < text.length) {
                    typingEl.textContent += text.charAt(typingIndex);
                    typingIndex++;
                    const delay = text.charAt(typingIndex - 1) === '\n' ? 180 :
                        text.charAt(typingIndex - 1) === ' ' ? 60 :

            // Sakura petals
